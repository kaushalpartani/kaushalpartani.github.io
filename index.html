<!DOCTYPE html>
<meta charset="utf-8">
<style>
path {
    stroke: #ffffff;
    stroke-width: 3px;
}

html, body {
  	width: 100vh;
	height: 100vh;
}
body{
	display:flex;
}
#content {
        width: 90%;
        height: 90%;
    
}
div.tooltip {	
    position: absolute;			
    text-align: center;			
    width: 60px;					
    height: 28px;					
    padding: 2px;				
    font: 12px sans-serif;		
    background: lightsteelblue;	
    border: 0px;		
    border-radius: 8px;			
    pointer-events: none;			
}
.center-div
{
     position: absolute;
     margin: auto;
     top: 0;
     right: 0;
     bottom: 0;
     left: 0;
     width: 100px;
     height: 100px;
}


</style>
<body>
<div id="content" class="center-div"></div>
<script src="https://d3js.org/d3.v3.min.js"></script>
<script type="javascript" src="animation.js">
</script>
</body>
</html>
