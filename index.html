<!DOCTYPE html>
<meta charset="utf-8">
<style>
path {
    stroke: #ffffff;
    stroke-width: 3px;
}

html, body {
  	width: 100vh;
	height: 100vh;
}
body{
	display:flex;
}
#content {
        width: 90%;
        height: 90%;
    
}
div.tooltip {	
    position: absolute;			
    text-align: center;			
    width: 60px;					
    height: 28px;					
    padding: 2px;				
    font: 12px sans-serif;		
    background: lightsteelblue;	
    border: 0px;		
    border-radius: 8px;			
    pointer-events: none;			
}
.center-div
{
     position: absolute;
     margin: auto;
     top: 0;
     right: 0;
     bottom: 0;
     left: 0;
     width: 100px;
     height: 100px;
}


</style>
<body>
<div id="content" class="center-div"></div>
<script src="http://d3js.org/d3.v3.min.js"></script>
<script>
var links = [ {name: "one", value: 1},
			{name: "two", value:  1},
			{name: "three", value:  1},
			{name: "four", value:  1},
			{name: "five", value:  1} ];

var div = d3.select("body").append("div")	
    .attr("class", "tooltip")				
    .style("opacity", 0);
var margin = {top: 50, right: 50, bottom: 50, left: 50};
	width = document.getElementById("content").clientWidth - margin.left - margin.right; //600 - margin.left - margin.right;
	height = document.getElementById("content").clientHeight - margin.top - margin.bottom; // 1500 - margin.top - margin.bottom;
console.log(width);
console.log(height);
console.log(document.getElementsByClassName("html").clientHeight);

var chart = d3.select("#content")
				.append('svg')
			    .attr("width", width + margin.left + margin.right)
			    .attr("height", height + margin.top + margin.bottom)
			   .append("g")
    			.attr("transform", "translate(" + ((width/2)+margin.left) + "," + ((height/2)+margin.top) + ")");


var radius = Math.min(width, height) / 2;

var color = d3.scale.ordinal()
	.range(["#3399FF", "#5DAEF8", "#86C3FA", "#ADD6FB", "#D6EBFD"]);

var arc = d3.svg.arc()
    .outerRadius(radius)
    .innerRadius(radius - 50);

var pie = d3.layout.pie()
    .sort(null)
    .startAngle(1.1*Math.PI)
    .endAngle(3.1*Math.PI)
    .value(function(d) { return d.value; });


var g = chart.selectAll(".arc")
  .data(pie(links))
.enter().append("g")
  .attr("class", "arc");

g.append("path")
    .attr("fill", function(d, i) { return color(i); })
    .on("mouseenter", function(d) {

 	     var endAngle = d.endAngle;
             var startAngle = d.startAngle;
         
                  var arcOver = d3.svg.arc()
        .outerRadius(radius + 50).endAngle(endAngle).startAngle(startAngle)
	.innerRadius(radius-50).endAngle(endAngle).startAngle(startAngle);
         
            d3.select(this)
               .attr("stroke","white")
               .transition()
               .duration(1000)
               .attr("d", arcOver)             
               .attr("stroke-width",6);

})
  .on("mouseleave", function(d) {
            d3.select(this).transition()
	       .duration(1000)            
               .attr("d", arc)
               .attr("stroke","none");
})	
  .transition()
    .ease("exp")
    .duration(2000)
    .attrTween("d", tweenPie);

function tweenPie(b) {
  var i = d3.interpolate({startAngle: 1.1*Math.PI, endAngle: 1.1*Math.PI}, b);
  return function(t) { return arc(i(t)); };
}

</script>
</body>
</html>
